# DeployGTM — Tool Configuration
# Toggle tools on/off without touching code.
# All API keys live in .env — never here.

tools:

  apollo:
    enabled: true
    # Titles to search for at each target account (in priority order)
    target_titles:
      - "CEO"
      - "Co-Founder"
      - "Founder"
      - "VP Sales"
      - "Head of Sales"
      - "VP Revenue"
      - "Head of Growth"
      - "RevOps"
      - "Revenue Operations"

  octave:
    # Set to true only if you have an Octave subscription and OCTAVE_API_KEY is set.
    # When false, the system reads brain/ files instead (free, local, editable).
    enabled: false

  birddog:
    # Set to true once BirdDog API access is confirmed.
    # When false, signals are captured manually via the pipeline CLI.
    enabled: false

  hubspot:
    enabled: true
    # ALWAYS confirm before writing to production CRM.
    require_confirmation: true
    # Set to true to use HubSpot sandbox environment.
    sandbox: false

# Brain (local Octave replacement) — always available as fallback
brain:
  path: brain/
  files:
    icp: icp.md
    personas: personas.md
    messaging: messaging.md
    objections: objections.md
    product: product.md

# ICP scoring thresholds (ICP Fit 1–5 × Signal Strength 1–3 = Priority)
scoring:
  activate_immediately: 12   # Priority >= 12 → reach out today
  activate_this_week: 8      # Priority >= 8  → reach out this week
  nurture: 5                 # Priority >= 5  → add to nurture / monitor
  skip_below: 5              # Priority < 5   → do not pursue

# Where enriched outputs are saved before CRM push
output:
  path: output/
  format: json
